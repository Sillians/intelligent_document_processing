name: Release Candidate

on:
  workflow_run:
    workflows:
      - IDP CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag. Defaults to the selected commit SHA.
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: idp-release-candidate-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

env:
  SOURCE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
  RELEASE_PLATFORMS: linux/amd64,linux/arm64

jobs:
  publish:
    name: Publish release candidate images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_SHA }}

      - name: Resolve image metadata
        run: |
          set -euo pipefail
          image_namespace="ghcr.io/${GITHUB_REPOSITORY,,}"
          image_tag="${{ inputs.image_tag }}"
          if [ -z "$image_tag" ]; then
            image_tag="${SOURCE_SHA}"
          fi
          echo "IMAGE_NAMESPACE=${image_namespace}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${image_tag}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push ingestion-service
        run: |
          docker buildx build \
            --push \
            --platform "${RELEASE_PLATFORMS}" \
            --build-arg UV_GROUP=temporal \
            --label org.opencontainers.image.revision="${SOURCE_SHA}" \
            --tag "${IMAGE_NAMESPACE}/ingestion-service:${IMAGE_TAG}" \
            --tag "${IMAGE_NAMESPACE}/ingestion-service:staging-candidate" \
            -f docker/python-service.Dockerfile .

      - name: Build and push workflow-orchestrator
        run: |
          docker buildx build \
            --push \
            --platform "${RELEASE_PLATFORMS}" \
            --build-arg UV_GROUP=orchestrator \
            --label org.opencontainers.image.revision="${SOURCE_SHA}" \
            --tag "${IMAGE_NAMESPACE}/workflow-orchestrator:${IMAGE_TAG}" \
            --tag "${IMAGE_NAMESPACE}/workflow-orchestrator:staging-candidate" \
            -f docker/python-service.Dockerfile .

      - name: Build and push delivery-service
        run: |
          docker buildx build \
            --push \
            --platform "${RELEASE_PLATFORMS}" \
            --build-arg UV_GROUP=base \
            --label org.opencontainers.image.revision="${SOURCE_SHA}" \
            --tag "${IMAGE_NAMESPACE}/delivery-service:${IMAGE_TAG}" \
            --tag "${IMAGE_NAMESPACE}/delivery-service:staging-candidate" \
            -f docker/python-service.Dockerfile .

      - name: Write release candidate manifest
        run: |
          set -euo pipefail
          mkdir -p artifacts/release-candidate
          cat > artifacts/release-candidate/manifest.json <<JSON
          {
            "source_sha": "${SOURCE_SHA}",
            "image_namespace": "${IMAGE_NAMESPACE}",
            "image_tag": "${IMAGE_TAG}",
            "platforms": "${RELEASE_PLATFORMS}",
            "images": {
              "ingestion-service": "${IMAGE_NAMESPACE}/ingestion-service:${IMAGE_TAG}",
              "workflow-orchestrator": "${IMAGE_NAMESPACE}/workflow-orchestrator:${IMAGE_TAG}",
              "delivery-service": "${IMAGE_NAMESPACE}/delivery-service:${IMAGE_TAG}"
            }
          }
          JSON

      - name: Upload release candidate manifest
        uses: actions/upload-artifact@v4
        with:
          name: release-candidate-manifest
          path: artifacts/release-candidate/manifest.json
          if-no-files-found: error
