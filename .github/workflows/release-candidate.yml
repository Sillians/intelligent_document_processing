name: Release Candidate

on:
  workflow_run:
    workflows:
      - IDP CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag. Defaults to the selected commit SHA.
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: idp-release-candidate-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

env:
  SOURCE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
  RELEASE_PLATFORMS: linux/amd64
  OCR_RELEASE_PLATFORMS: linux/amd64,linux/arm64

jobs:
  publish:
    name: Publish release candidate images
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_SHA }}

      - name: Resolve image metadata
        run: |
          set -euo pipefail
          image_namespace="ghcr.io/${GITHUB_REPOSITORY,,}"
          image_tag="${{ inputs.image_tag }}"
          if [ -z "$image_tag" ]; then
            image_tag="${SOURCE_SHA}"
          fi
          echo "IMAGE_NAMESPACE=${image_namespace}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${image_tag}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push release images
        run: |
          set -euo pipefail
          services=(
            ingestion-service
            workflow-orchestrator
            preprocess-worker
            ocr-service
            layout-service
            classifier-router-service
            extraction-service
            validation-service
            human-review-console
            delivery-service
            evaluation-service
            mlflow
          )
          groups=(
            temporal
            orchestrator
            preprocess
            ocr-cpu
            preprocess
            base
            extraction
            base
            base
            base
            evaluation
            base
          )
          dockerfiles=(
            docker/python-service.Dockerfile
            docker/python-service.Dockerfile
            docker/python-service.Dockerfile
            docker/python-service.Dockerfile
            docker/python-service.Dockerfile
            docker/python-service.Dockerfile
            docker/python-service.Dockerfile
            docker/python-service.Dockerfile
            docker/python-service.Dockerfile
            docker/python-service.Dockerfile
            docker/python-service.Dockerfile
            docker/mlflow.Dockerfile
          )
          extra_apt=(
            ""
            ""
            "libglib2.0-0 libgl1 libsm6 libxext6 libxrender1"
            "libglib2.0-0 libgl1 libsm6 libxext6 libxrender1 tesseract-ocr tesseract-ocr-eng"
            "libglib2.0-0 libgl1 libsm6 libxext6 libxrender1"
            ""
            ""
            ""
            ""
            ""
            ""
            ""
          )

          for i in "${!services[@]}"; do
            service="${services[$i]}"
            build_args=(--build-arg "UV_GROUP=${groups[$i]}")
            if [ -n "${extra_apt[$i]}" ]; then
              build_args+=(--build-arg "EXTRA_APT_PACKAGES=${extra_apt[$i]}")
            fi
            build_platforms="${RELEASE_PLATFORMS}"
            if [ "${service}" = "ocr-service" ]; then
              build_platforms="${OCR_RELEASE_PLATFORMS}"
            fi
            echo "Building ${service} for ${build_platforms}"
            docker buildx build \
              --push \
              --platform "${build_platforms}" \
              "${build_args[@]}" \
              --label org.opencontainers.image.revision="${SOURCE_SHA}" \
              --tag "${IMAGE_NAMESPACE}/${service}:${IMAGE_TAG}" \
              --tag "${IMAGE_NAMESPACE}/${service}:staging-candidate" \
              -f "${dockerfiles[$i]}" .
          done

      - name: Write release candidate manifest
        run: |
          set -euo pipefail
          mkdir -p artifacts/release-candidate
          services=(
            ingestion-service
            workflow-orchestrator
            preprocess-worker
            ocr-service
            layout-service
            classifier-router-service
            extraction-service
            validation-service
            human-review-console
            delivery-service
            evaluation-service
            mlflow
          )
          {
            printf '{\n'
            printf '  "source_sha": "%s",\n' "${SOURCE_SHA}"
            printf '  "image_namespace": "%s",\n' "${IMAGE_NAMESPACE}"
            printf '  "image_tag": "%s",\n' "${IMAGE_TAG}"
            printf '  "platforms": "%s",\n' "${RELEASE_PLATFORMS}"
            printf '  "ocr_platforms": "%s",\n' "${OCR_RELEASE_PLATFORMS}"
            printf '  "images": {\n'
            for i in "${!services[@]}"; do
              service="${services[$i]}"
              comma=","
              if [ "$i" -eq "$((${#services[@]} - 1))" ]; then
                comma=""
              fi
              printf '    "%s": "%s/%s:%s"%s\n' "${service}" "${IMAGE_NAMESPACE}" "${service}" "${IMAGE_TAG}" "${comma}"
            done
            printf '  }\n'
            printf '}\n'
          } > artifacts/release-candidate/manifest.json

      - name: Upload release candidate manifest
        uses: actions/upload-artifact@v4
        with:
          name: release-candidate-manifest
          path: artifacts/release-candidate/manifest.json
          if-no-files-found: error
