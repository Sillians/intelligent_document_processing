name: Deploy Staging

on:
  workflow_run:
    workflows:
      - Release Candidate
    branches:
      - main
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to deploy. Defaults to the selected commit SHA.
        required: false
        type: string

permissions:
  contents: read
  packages: read

concurrency:
  group: idp-staging
  cancel-in-progress: false

env:
  SOURCE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  deploy:
    name: Deploy release candidate to staging
    runs-on: [self-hosted, staging]
    timeout-minutes: 20
    environment: staging
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_SHA }}

      - name: Resolve deployment metadata
        env:
          STAGING_APP_DIR_OVERRIDE: ${{ vars.STAGING_APP_DIR }}
        run: |
          set -euo pipefail
          image_namespace="ghcr.io/${GITHUB_REPOSITORY,,}"
          image_tag="${{ inputs.image_tag }}"
          if [ -z "$image_tag" ]; then
            image_tag="${SOURCE_SHA}"
          fi

          if [ -n "${STAGING_APP_DIR_OVERRIDE}" ]; then
            staging_app_dir="${STAGING_APP_DIR_OVERRIDE}"
          elif [ "${RUNNER_OS:-}" = "macOS" ]; then
            staging_app_dir="${HOME}/idp-staging"
          else
            staging_app_dir="/opt/idp-staging"
          fi

          {
            echo "IMAGE_NAMESPACE=${image_namespace}"
            echo "IMAGE_TAG=${image_tag}"
            echo "STAGING_APP_DIR=${staging_app_dir}"
          } >> "$GITHUB_ENV"

      - name: Validate staging secrets
        env:
          STAGING_ENV_FILE: ${{ secrets.STAGING_ENV_FILE }}
        run: |
          set -euo pipefail
          missing=()
          if [ -z "$STAGING_ENV_FILE" ]; then
            missing+=("STAGING_ENV_FILE")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required staging secret(s): %s\n' "${missing[*]}" >&2
            printf 'Configure these under repository Settings > Secrets and variables > Actions, or in the staging environment secrets.\n' >&2
            exit 1
          fi

      - name: Prepare local release on staging runner
        env:
          STAGING_ENV_FILE: ${{ secrets.STAGING_ENV_FILE }}
        run: |
          set -euo pipefail
          release_dir="${STAGING_APP_DIR}/releases/${SOURCE_SHA}"
          current_link="${STAGING_APP_DIR}/current"

          if [ -z "$STAGING_APP_DIR" ] || [ "$STAGING_APP_DIR" = "/" ]; then
            echo "Refusing to deploy with unsafe STAGING_APP_DIR='${STAGING_APP_DIR}'." >&2
            exit 1
          fi
          rm -rf "$release_dir"
          if ! mkdir -p "$release_dir"; then
            echo "Unable to create ${release_dir}. Ensure the self-hosted runner user owns ${STAGING_APP_DIR}." >&2
            exit 1
          fi

          tar \
            --exclude='.git' \
            --exclude='.venv' \
            --exclude='artifacts' \
            --exclude='data' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='id_ed25519*' \
            --exclude='id_rsa*' \
            --exclude='__pycache__' \
            -czf - . | tar -xzf - -C "$release_dir"
          ln -sfn "$release_dir" "$current_link"
          printf '%s\n' "$STAGING_ENV_FILE" > "${current_link}/.env.staging.tmp"
          chmod 600 "${current_link}/.env.staging.tmp"
          mv "${current_link}/.env.staging.tmp" "${current_link}/.env.staging"

      - name: Deploy services on staging
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cd "${STAGING_APP_DIR}/current"
          export DOCKER_CONFIG="${RUNNER_TEMP}/docker-config"
          mkdir -p "${DOCKER_CONFIG}"
          printf '{"auths":{}}\n' > "${DOCKER_CONFIG}/config.json"
          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
          export IDP_ENV_FILE=.env.staging
          export IDP_IMAGE_REGISTRY="${IMAGE_NAMESPACE}"
          export IDP_IMAGE_TAG="${IMAGE_TAG}"
          docker compose --env-file .env.staging -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.staging.yml config --quiet
          docker compose --env-file .env.staging -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.staging.yml pull ingestion-service workflow-orchestrator delivery-service
          docker compose --env-file .env.staging -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.staging.yml up -d --no-build --no-deps gateway ingestion-service workflow-orchestrator delivery-service
          docker compose --env-file .env.staging -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.staging.yml ps gateway ingestion-service workflow-orchestrator delivery-service

      - name: Run post-deploy staging smoke
        env:
          STAGING_PUBLIC_BASE_URL: ${{ secrets.STAGING_PUBLIC_BASE_URL }}
          STAGING_SMOKE_API_KEY: ${{ secrets.STAGING_SMOKE_API_KEY }}
          STAGING_TENANT_ID: ${{ vars.STAGING_TENANT_ID || 'default' }}
          STAGING_PROMETHEUS_URL: ${{ secrets.STAGING_PROMETHEUS_URL }}
        run: |
          set -euo pipefail
          if [ -z "$STAGING_PUBLIC_BASE_URL" ] || [ -z "$STAGING_SMOKE_API_KEY" ]; then
            echo "Skipping staging smoke: STAGING_PUBLIC_BASE_URL or STAGING_SMOKE_API_KEY is not configured."
            exit 0
          fi
          args=(
            smoke
            --api-url "$STAGING_PUBLIC_BASE_URL"
            --api-key "$STAGING_SMOKE_API_KEY"
            --tenant-id "$STAGING_TENANT_ID"
            --artifact-dir "artifacts/staging/smoke/${SOURCE_SHA}"
          )
          if [ -n "$STAGING_PROMETHEUS_URL" ]; then
            args+=(--prometheus-url "$STAGING_PROMETHEUS_URL" --require-observability)
          fi
          python3 scripts/staging_operational_drill.py "${args[@]}"

      - name: Upload staging smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-smoke-${{ env.SOURCE_SHA }}
          path: artifacts/staging/smoke/${{ env.SOURCE_SHA }}
          if-no-files-found: ignore
