name: Deploy Staging

on:
  workflow_run:
    workflows:
      - Release Candidate
    branches:
      - main
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to deploy. Defaults to the selected commit SHA.
        required: false
        type: string

permissions:
  contents: read
  packages: read

concurrency:
  group: idp-staging
  cancel-in-progress: false

env:
  SOURCE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  deploy:
    name: Deploy release candidate to staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: staging
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_SHA }}

      - name: Resolve deployment metadata
        env:
          STAGING_APP_DIR: ${{ vars.STAGING_APP_DIR || '/opt/idp' }}
        run: |
          set -euo pipefail
          image_namespace="ghcr.io/${GITHUB_REPOSITORY,,}"
          image_tag="${{ inputs.image_tag }}"
          if [ -z "$image_tag" ]; then
            image_tag="${SOURCE_SHA}"
          fi
          {
            echo "IMAGE_NAMESPACE=${image_namespace}"
            echo "IMAGE_TAG=${image_tag}"
            echo "STAGING_APP_DIR=${STAGING_APP_DIR}"
          } >> "$GITHUB_ENV"

      - name: Validate staging secrets
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          STAGING_ENV_FILE: ${{ secrets.STAGING_ENV_FILE }}
        run: |
          set -euo pipefail
          missing=()
          if [ -z "$STAGING_HOST" ]; then
            missing+=("STAGING_HOST")
          fi
          if [ -z "$STAGING_USER" ]; then
            missing+=("STAGING_USER")
          fi
          if [ -z "$STAGING_SSH_KEY" ]; then
            missing+=("STAGING_SSH_KEY")
          fi
          if [ -z "$STAGING_ENV_FILE" ]; then
            missing+=("STAGING_ENV_FILE")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required staging secret(s): %s\n' "${missing[*]}" >&2
            printf 'Configure these under repository Settings > Secrets and variables > Actions, or in the staging environment secrets.\n' >&2
            exit 1
          fi

      - name: Install Cloudflare Client
        env:
          STAGING_USE_CLOUDFLARE: ${{ vars.STAGING_USE_CLOUDFLARE || 'false' }}
        run: |
          set -euo pipefail
          case "${STAGING_USE_CLOUDFLARE}" in
            true|TRUE|1|yes|YES|on|ON)
              ;;
            *)
              echo "Skipping cloudflared install because STAGING_USE_CLOUDFLARE is not enabled."
              exit 0
              ;;
          esac

          curl --fail --location --show-error \
            --output cloudflared.deb \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          cloudflared --version

      - name: Configure SSH
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_PORT: ${{ secrets.STAGING_PORT || '22' }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          STAGING_KNOWN_HOSTS: ${{ secrets.STAGING_KNOWN_HOSTS }}
          STAGING_USE_CLOUDFLARE: ${{ vars.STAGING_USE_CLOUDFLARE || 'false' }}
        run: |
          set -euo pipefail
          use_cloudflare=false
          case "${STAGING_USE_CLOUDFLARE}" in
            true|TRUE|1|yes|YES|on|ON)
              use_cloudflare=true
              ;;
          esac

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$STAGING_SSH_KEY" > ~/.ssh/id_staging
          chmod 600 ~/.ssh/id_staging
          if ! ssh-keygen -y -f ~/.ssh/id_staging >/dev/null 2>&1; then
            echo "STAGING_SSH_KEY is not a valid private key. Store the full private key, including BEGIN/END lines, as the staging environment secret." >&2
            exit 1
          fi
          if [ -n "$STAGING_KNOWN_HOSTS" ]; then
            echo "Using configured STAGING_KNOWN_HOSTS."
            printf '%s\n' "$STAGING_KNOWN_HOSTS" > ~/.ssh/known_hosts
          elif [ "$use_cloudflare" = true ]; then
            echo "STAGING_KNOWN_HOSTS is required when STAGING_USE_CLOUDFLARE=true because ssh-keyscan cannot scan through Cloudflare Access." >&2
            exit 1
          else
            echo "STAGING_KNOWN_HOSTS is not configured; scanning ${STAGING_HOST}:${STAGING_PORT}."
            if ! ssh-keyscan -T 10 -p "$STAGING_PORT" "$STAGING_HOST" >> ~/.ssh/known_hosts; then
              echo "Unable to scan SSH host key for ${STAGING_HOST}:${STAGING_PORT}. Verify STAGING_HOST/STAGING_PORT are reachable from GitHub-hosted runners, or set STAGING_KNOWN_HOSTS explicitly." >&2
              exit 1
            fi
          fi
          if [ ! -s ~/.ssh/known_hosts ]; then
            echo "known_hosts is empty. Set STAGING_KNOWN_HOSTS to the verified ssh-keyscan output for the staging host." >&2
            exit 1
          fi
          chmod 600 ~/.ssh/known_hosts

          {
            echo "Host ${STAGING_HOST}"
            echo "  HostName ${STAGING_HOST}"
            echo "  User ${STAGING_USER}"
            echo "  Port ${STAGING_PORT}"
            echo "  IdentityFile ~/.ssh/id_staging"
            echo "  IdentitiesOnly yes"
            echo "  BatchMode yes"
            echo "  StrictHostKeyChecking yes"
            echo "  UserKnownHostsFile ~/.ssh/known_hosts"
            if [ "$use_cloudflare" = true ]; then
              cloudflared_path="$(command -v cloudflared || true)"
              if [ -z "$cloudflared_path" ]; then
                echo "cloudflared is required when STAGING_USE_CLOUDFLARE=true, but it is not installed." >&2
                exit 1
              fi
              echo "  ProxyCommand ${cloudflared_path} access ssh --hostname %h"
            fi
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config
          ssh -F ~/.ssh/config -G "$STAGING_HOST" >/dev/null

      - name: Upload deployment bundle
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_PORT: ${{ secrets.STAGING_PORT || '22' }}
        run: |
          set -euo pipefail
          ssh -F ~/.ssh/config -i ~/.ssh/id_staging -p "$STAGING_PORT" -o BatchMode=yes "${STAGING_USER}@${STAGING_HOST}" \
            "mkdir -p '${STAGING_APP_DIR}/releases/${SOURCE_SHA}'"
          tar \
            --exclude='.git' \
            --exclude='.venv' \
            --exclude='artifacts' \
            --exclude='data' \
            --exclude='__pycache__' \
            -czf - . | ssh -F ~/.ssh/config -i ~/.ssh/id_staging -p "$STAGING_PORT" -o BatchMode=yes "${STAGING_USER}@${STAGING_HOST}" \
            "tar -xzf - -C '${STAGING_APP_DIR}/releases/${SOURCE_SHA}' && ln -sfn '${STAGING_APP_DIR}/releases/${SOURCE_SHA}' '${STAGING_APP_DIR}/current'"

      - name: Install staging env file
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_PORT: ${{ secrets.STAGING_PORT || '22' }}
          STAGING_ENV_FILE: ${{ secrets.STAGING_ENV_FILE }}
        run: |
          set -euo pipefail
          printf '%s\n' "$STAGING_ENV_FILE" | ssh -F ~/.ssh/config -i ~/.ssh/id_staging -p "$STAGING_PORT" -o BatchMode=yes "${STAGING_USER}@${STAGING_HOST}" \
            "cat > '${STAGING_APP_DIR}/current/.env.staging.tmp' && chmod 600 '${STAGING_APP_DIR}/current/.env.staging.tmp' && mv '${STAGING_APP_DIR}/current/.env.staging.tmp' '${STAGING_APP_DIR}/current/.env.staging'"

      - name: Deploy services on staging
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_PORT: ${{ secrets.STAGING_PORT || '22' }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ssh -F ~/.ssh/config -i ~/.ssh/id_staging -p "$STAGING_PORT" -o BatchMode=yes "${STAGING_USER}@${STAGING_HOST}" \
            "cd '${STAGING_APP_DIR}/current' && \
             echo '${GHCR_TOKEN}' | docker login ghcr.io -u '${GHCR_USERNAME}' --password-stdin && \
             export IDP_ENV_FILE=.env.staging && \
             export IDP_IMAGE_REGISTRY='${IMAGE_NAMESPACE}' && \
             export IDP_IMAGE_TAG='${IMAGE_TAG}' && \
             docker compose --env-file .env.staging -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.staging.yml config --quiet && \
             docker compose --env-file .env.staging -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.staging.yml pull ingestion-service workflow-orchestrator delivery-service && \
             docker compose --env-file .env.staging -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.staging.yml up -d --no-build --no-deps gateway ingestion-service workflow-orchestrator delivery-service && \
             docker compose --env-file .env.staging -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.staging.yml ps gateway ingestion-service workflow-orchestrator delivery-service"

      - name: Run post-deploy staging smoke
        env:
          STAGING_PUBLIC_BASE_URL: ${{ secrets.STAGING_PUBLIC_BASE_URL }}
          STAGING_SMOKE_API_KEY: ${{ secrets.STAGING_SMOKE_API_KEY }}
          STAGING_TENANT_ID: ${{ vars.STAGING_TENANT_ID || 'default' }}
          STAGING_PROMETHEUS_URL: ${{ secrets.STAGING_PROMETHEUS_URL }}
        run: |
          set -euo pipefail
          if [ -z "$STAGING_PUBLIC_BASE_URL" ] || [ -z "$STAGING_SMOKE_API_KEY" ]; then
            echo "Skipping staging smoke: STAGING_PUBLIC_BASE_URL or STAGING_SMOKE_API_KEY is not configured."
            exit 0
          fi
          args=(
            smoke
            --api-url "$STAGING_PUBLIC_BASE_URL"
            --api-key "$STAGING_SMOKE_API_KEY"
            --tenant-id "$STAGING_TENANT_ID"
            --artifact-dir "artifacts/staging/smoke/${SOURCE_SHA}"
          )
          if [ -n "$STAGING_PROMETHEUS_URL" ]; then
            args+=(--prometheus-url "$STAGING_PROMETHEUS_URL" --require-observability)
          fi
          python3 scripts/staging_operational_drill.py "${args[@]}"

      - name: Upload staging smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-smoke-${{ env.SOURCE_SHA }}
          path: artifacts/staging/smoke/${{ env.SOURCE_SHA }}
          if-no-files-found: ignore
