name: Deploy Staging

on:
  workflow_run:
    workflows:
      - Release Candidate
    branches:
      - main
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to deploy. Defaults to the selected commit SHA.
        required: false
        type: string

permissions:
  contents: read
  packages: read

concurrency:
  group: idp-staging
  cancel-in-progress: false

env:
  SOURCE_SHA: ${{ inputs.image_tag || github.event.workflow_run.head_sha || github.sha }}

jobs:
  deploy:
    name: Deploy release candidate to staging
    runs-on: [self-hosted, staging]
    timeout-minutes: 45
    environment: staging
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.SOURCE_SHA }}

      - name: Resolve deployment metadata
        env:
          STAGING_APP_DIR_OVERRIDE: ${{ vars.STAGING_APP_DIR }}
        run: |
          set -euo pipefail
          image_namespace="ghcr.io/${GITHUB_REPOSITORY,,}"
          image_tag="${{ inputs.image_tag }}"
          if [ -z "$image_tag" ]; then
            image_tag="${SOURCE_SHA}"
          fi
          if ! [[ "${image_tag}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Staging image_tag must be an immutable 40-character commit SHA." >&2
            exit 1
          fi

          if [ -n "${STAGING_APP_DIR_OVERRIDE}" ]; then
            staging_app_dir="${STAGING_APP_DIR_OVERRIDE}"
          elif [ "${RUNNER_OS:-}" = "macOS" ]; then
            staging_app_dir="${HOME}/idp-staging"
          else
            staging_app_dir="/opt/idp-staging"
          fi

          {
            echo "IMAGE_NAMESPACE=${image_namespace}"
            echo "IMAGE_TAG=${image_tag}"
            echo "STAGING_APP_DIR=${staging_app_dir}"
          } >> "$GITHUB_ENV"

      - name: Verify release images exist in GHCR
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          export DOCKER_CONFIG="${RUNNER_TEMP}/docker-config-ghcr-preflight"
          mkdir -p "${DOCKER_CONFIG}"
          ghcr_auth="$(printf '%s:%s' "${GHCR_USERNAME}" "${GHCR_TOKEN}" | base64 | tr -d '\n')"
          printf '{"auths":{"ghcr.io":{"auth":"%s"}}}\n' "${ghcr_auth}" > "${DOCKER_CONFIG}/config.json"

          release_services=(
            ingestion-service
            workflow-orchestrator
            preprocess-worker
            ocr-service
            layout-service
            classifier-router-service
            extraction-service
            validation-service
            human-review-console
            delivery-service
            evaluation-service
            mlflow
          )
          missing=()
          for service in "${release_services[@]}"; do
            image="${IMAGE_NAMESPACE}/${service}:${IMAGE_TAG}"
            if docker manifest inspect "${image}" >/dev/null 2>&1; then
              echo "Found ${image}"
            else
              missing+=("${image}")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "The requested staging image tag is not fully published: ${IMAGE_TAG}" >&2
            printf 'Missing release image: %s\n' "${missing[@]}" >&2
            echo "" >&2
            echo "Deploy Staging only accepts immutable SHA tags that were published by a successful Release Candidate run." >&2
            echo "Run the Release Candidate workflow for ${IMAGE_TAG}, or rerun Deploy Staging with a SHA from a successful release-candidate manifest." >&2
            exit 1
          fi

      - name: Validate staging secrets
        env:
          STAGING_ENV_FILE: ${{ secrets.STAGING_ENV_FILE }}
        run: |
          set -euo pipefail
          missing=()
          if [ -z "$STAGING_ENV_FILE" ]; then
            missing+=("STAGING_ENV_FILE")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required staging secret(s): %s\n' "${missing[*]}" >&2
            printf 'Configure these under repository Settings > Secrets and variables > Actions, or in the staging environment secrets.\n' >&2
            exit 1
          fi

      - name: Prepare local release on staging runner
        env:
          STAGING_ENV_FILE: ${{ secrets.STAGING_ENV_FILE }}
        run: |
          set -euo pipefail
          release_dir="${STAGING_APP_DIR}/releases/${SOURCE_SHA}"
          current_link="${STAGING_APP_DIR}/current"

          if [ -z "$STAGING_APP_DIR" ] || [ "$STAGING_APP_DIR" = "/" ]; then
            echo "Refusing to deploy with unsafe STAGING_APP_DIR='${STAGING_APP_DIR}'." >&2
            exit 1
          fi
          rm -rf "$release_dir"
          if ! mkdir -p "$release_dir"; then
            echo "Unable to create ${release_dir}. Ensure the self-hosted runner user owns ${STAGING_APP_DIR}." >&2
            exit 1
          fi

          tar \
            --exclude='.git' \
            --exclude='.venv' \
            --exclude='artifacts' \
            --exclude='data' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='id_ed25519*' \
            --exclude='id_rsa*' \
            --exclude='__pycache__' \
            -czf - . | tar -xzf - -C "$release_dir"
          ln -sfn "$release_dir" "$current_link"
          printf '%s\n' "$STAGING_ENV_FILE" > "${current_link}/.env.staging.tmp"
          chmod 600 "${current_link}/.env.staging.tmp"
          mv "${current_link}/.env.staging.tmp" "${current_link}/.env.staging"
          printf '%s\n' "${IMAGE_TAG}" > "${current_link}/.idp-release-sha"

      - name: Deploy services on staging
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
          STAGING_DOCKER_PRUNE_BEFORE_PULL: ${{ vars.STAGING_DOCKER_PRUNE_BEFORE_PULL || 'true' }}
          STAGING_IMAGE_PULL_ATTEMPTS: ${{ vars.STAGING_IMAGE_PULL_ATTEMPTS || '3' }}
          STAGING_DOCKER_HOST: ${{ vars.STAGING_DOCKER_HOST }}
        run: |
          set -euo pipefail
          cd "${STAGING_APP_DIR}/current"
          export DOCKER_CONFIG="${RUNNER_TEMP}/docker-config"
          mkdir -p "${DOCKER_CONFIG}"
          ghcr_auth="$(printf '%s:%s' "${GHCR_USERNAME}" "${GHCR_TOKEN}" | base64 | tr -d '\n')"
          printf '{"auths":{"ghcr.io":{"auth":"%s"}}}\n' "${ghcr_auth}" > "${DOCKER_CONFIG}/config.json"
          export IDP_ENV_FILE=.env.staging
          export IDP_IMAGE_REGISTRY="${IMAGE_NAMESPACE}"
          export IDP_IMAGE_TAG="${IMAGE_TAG}"

          configure_docker_client() {
            if [ -n "${STAGING_DOCKER_HOST:-}" ]; then
              export DOCKER_HOST="${STAGING_DOCKER_HOST}"
              echo "Using Docker host from STAGING_DOCKER_HOST."
            elif [ "${RUNNER_OS:-}" = "macOS" ]; then
              desktop_socket="${HOME}/.docker/run/docker.sock"
              if [ -S "${desktop_socket}" ]; then
                export DOCKER_HOST="unix://${desktop_socket}"
                echo "Using Docker Desktop socket: ${DOCKER_HOST}"
              else
                echo "Docker Desktop socket was not found at ${desktop_socket}." >&2
                echo "Start or unpause Docker Desktop for the same macOS user that runs the self-hosted runner." >&2
                echo "Alternatively set the staging variable STAGING_DOCKER_HOST to the runner's Docker socket URL." >&2
                exit 1
              fi
            fi

            if ! docker version; then
              echo "Unable to connect to Docker before staging deployment." >&2
              echo "On macOS, ensure Docker Desktop is running, not paused, and started under the same user as the GitHub runner." >&2
              echo "Current DOCKER_HOST=${DOCKER_HOST:-<default docker context>}." >&2
              exit 1
            fi
            docker compose version
          }

          configure_docker_client

          gateway_http_bind="$(awk -F= '$1 == "GATEWAY_HTTP_BIND" {gsub(/[[:space:]"]/, "", $2); print $2}' .env.staging | tail -n 1)"
          gateway_http_host_port="$(awk -F= '$1 == "GATEWAY_HTTP_HOST_PORT" {gsub(/[[:space:]"]/, "", $2); print $2}' .env.staging | tail -n 1)"
          gateway_https_bind="$(awk -F= '$1 == "GATEWAY_HTTPS_BIND" {gsub(/[[:space:]"]/, "", $2); print $2}' .env.staging | tail -n 1)"
          gateway_https_host_port="$(awk -F= '$1 == "GATEWAY_HTTPS_HOST_PORT" {gsub(/[[:space:]"]/, "", $2); print $2}' .env.staging | tail -n 1)"
          gateway_http_bind="${gateway_http_bind:-0.0.0.0}"
          gateway_http_host_port="${gateway_http_host_port:-8081}"
          gateway_https_bind="${gateway_https_bind:-0.0.0.0}"
          gateway_https_host_port="${gateway_https_host_port:-8443}"
          echo "Staging gateway ports: http=${gateway_http_bind}:${gateway_http_host_port}->8081 https=${gateway_https_bind}:${gateway_https_host_port}->8443"

          if command -v lsof >/dev/null 2>&1 && lsof -nP -iTCP:"${gateway_http_host_port}" -sTCP:LISTEN >/dev/null 2>&1; then
            if docker ps --format '{{.Names}} {{.Ports}}' | grep -E "idp-staging-stack-gateway-1 .*:${gateway_http_host_port}->8081/tcp" >/dev/null 2>&1; then
              echo "Host port ${gateway_http_host_port} is already owned by the existing staging gateway; continuing with redeploy."
            else
              echo "Host port ${gateway_http_host_port} is already allocated before staging deploy." >&2
              echo "Stop the conflicting process/container, or update GATEWAY_HTTP_HOST_PORT inside the GitHub STAGING_ENV_FILE secret." >&2
              lsof -nP -iTCP:"${gateway_http_host_port}" -sTCP:LISTEN >&2 || true
              exit 1
            fi
          fi

          compose_files=(-f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.staging.yml)
          compose=(docker compose --env-file .env.staging "${compose_files[@]}")
          release_services=(
            ingestion-service
            workflow-orchestrator
            preprocess-worker
            ocr-service
            layout-service
            classifier-router-service
            extraction-service
            validation-service
            human-review-console
            delivery-service
            evaluation-service
            mlflow
          )
          app_services=(
            ingestion-service
            preprocess-worker
            ocr-service
            layout-service
            classifier-router-service
            extraction-service
            validation-service
            human-review-console
            delivery-service
            evaluation-service
            workflow-orchestrator
          )
          health_checked_services=(
            ingestion-service
            preprocess-worker
            ocr-service
            layout-service
            classifier-router-service
            extraction-service
            validation-service
            human-review-console
            delivery-service
            evaluation-service
          )
          observability_services=(
            prometheus
            alertmanager
            grafana
            node-exporter
          )
          pull_release_images() {
            attempts="${STAGING_IMAGE_PULL_ATTEMPTS:-3}"
            if ! [[ "${attempts}" =~ ^[1-9][0-9]*$ ]]; then
              echo "STAGING_IMAGE_PULL_ATTEMPTS must be a positive integer, got '${attempts}'." >&2
              exit 1
            fi

            for service in "${release_services[@]}"; do
              image="${IMAGE_NAMESPACE}/${service}:${IMAGE_TAG}"
              pull_args=()
              if [ "${service}" != "ocr-service" ]; then
                pull_args+=(--platform linux/amd64)
              fi
              pulled=false
              for attempt in $(seq 1 "${attempts}"); do
                if [ "${#pull_args[@]}" -gt 0 ]; then
                  echo "Pulling ${image} for linux/amd64 (${attempt}/${attempts})"
                else
                  echo "Pulling ${image} for runner-native platform (${attempt}/${attempts})"
                fi
                if docker image pull "${pull_args[@]}" "${image}"; then
                  pulled=true
                  break
                fi
                if [ "${attempt}" -lt "${attempts}" ]; then
                  sleep_seconds=$((attempt * 20))
                  echo "Pull failed for ${image}; retrying in ${sleep_seconds}s."
                  sleep "${sleep_seconds}"
                fi
              done
              if [ "${pulled}" != "true" ]; then
                echo "Failed to pull ${image} after ${attempts} attempt(s)." >&2
                docker system df >&2 || true
                exit 1
              fi
            done
          }

          "${compose[@]}" config --quiet
          echo "Docker storage before release image cleanup:"
          docker system df || true
          df -h || true
          if [ "${STAGING_DOCKER_PRUNE_BEFORE_PULL}" = "true" ]; then
            echo "Pruning stopped containers, build cache, and unused images before pulling large OCR/layout images."
            docker container prune -f || true
            docker builder prune -af || true
            docker image prune -af || true
          else
            echo "Skipping Docker cleanup because STAGING_DOCKER_PRUNE_BEFORE_PULL=${STAGING_DOCKER_PRUNE_BEFORE_PULL}."
          fi
          echo "Docker storage after release image cleanup:"
          docker system df || true
          pull_release_images
          "${compose[@]}" up -d --no-build postgres redis seaweedfs gateway

          postgres_user="$(awk -F= '$1 == "POSTGRES_USER" {gsub(/[[:space:]"]/, "", $2); print $2}' .env.staging | tail -n 1)"
          postgres_db="$(awk -F= '$1 == "POSTGRES_DB" {gsub(/[[:space:]"]/, "", $2); print $2}' .env.staging | tail -n 1)"
          postgres_user="${postgres_user:-idp}"
          postgres_db="${postgres_db:-idp}"

          ensure_database() {
            database_name="$1"
            case "${database_name}" in
              *[!A-Za-z0-9_]* | "")
                echo "Database names must contain only letters, numbers, and underscores: '${database_name}'." >&2
                exit 1
                ;;
            esac
            echo "Ensuring staging Postgres database exists: ${database_name}"
            if ! "${compose[@]}" exec -T postgres \
              psql -U "${postgres_user}" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname = '${database_name}'" | grep -q 1; then
              "${compose[@]}" exec -T postgres \
                psql -U "${postgres_user}" -d postgres -c "CREATE DATABASE \"${database_name}\""
            fi
          }

          wait_for_healthy() {
            service="$1"
            container="$("${compose[@]}" ps -q "${service}")"
            if [ -z "${container}" ]; then
              echo "${service} has no container after startup." >&2
              exit 1
            fi
            health="unknown"
            for attempt in $(seq 1 60); do
              health="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "${container}")"
              if [ "${health}" = "healthy" ] || [ "${health}" = "running" ]; then
                echo "${service} is ${health}."
                return 0
              fi
              if [ "${health}" = "unhealthy" ] || [ "${health}" = "exited" ] || [ "${health}" = "dead" ]; then
                echo "${service} became ${health} while waiting for startup." >&2
                docker logs --tail=200 "${container}" >&2 || true
                exit 1
              fi
              echo "Waiting for ${service} health (${attempt}/60): ${health}"
              sleep 5
            done
            echo "${service} did not become healthy before timeout; last state=${health}." >&2
            docker logs --tail=200 "${container}" >&2 || true
            exit 1
          }

          ensure_database "${postgres_db}"
          ensure_database temporal
          ensure_database temporal_visibility
          ensure_database mlflow
          ensure_database labelstudio

          "${compose[@]}" up -d --no-build temporal mlflow label-studio
          "${compose[@]}" up -d --no-build "${app_services[@]}"
          "${compose[@]}" up -d --no-build "${observability_services[@]}"
          for service in "${health_checked_services[@]}"; do
            wait_for_healthy "${service}"
          done
          for service in "${observability_services[@]}"; do
            wait_for_healthy "${service}"
          done
          "${compose[@]}" exec -T prometheus promtool check config /etc/prometheus/prometheus.yml
          "${compose[@]}" exec -T prometheus promtool check rules /etc/prometheus/alerts.yml

          provider_health_url="http://localhost:8016/health/provider"
          provider_ready=false
          for attempt in $(seq 1 30); do
            if "${compose[@]}" exec -T human-review-console python -c \
              "import urllib.request; urllib.request.urlopen('${provider_health_url}', timeout=10).read()"; then
              provider_ready=true
              echo "Human-review provider verification passed."
              break
            fi
            echo "Waiting for human-review provider verification (${attempt}/30)."
            sleep 5
          done
          if [ "${provider_ready}" != "true" ]; then
            echo "Human-review provider verification failed." >&2
            "${compose[@]}" logs --tail=200 human-review-console label-studio >&2 || true
            exit 1
          fi

          "${compose[@]}" ps postgres redis seaweedfs temporal gateway mlflow label-studio "${app_services[@]}" "${observability_services[@]}"

      - name: Verify staging observability
        run: |
          set -euo pipefail
          python3 scripts/staging_operational_drill.py observability \
            --prometheus-url http://127.0.0.1:9090 \
            --alertmanager-url http://127.0.0.1:9093 \
            --grafana-url http://127.0.0.1:3000 \
            --artifact-dir "artifacts/staging/observability/${SOURCE_SHA}"

      - name: Run post-deploy staging smoke
        env:
          STAGING_PUBLIC_BASE_URL: ${{ secrets.STAGING_PUBLIC_BASE_URL }}
          STAGING_SMOKE_API_KEY: ${{ secrets.STAGING_SMOKE_API_KEY }}
          STAGING_TENANT_ID: ${{ vars.STAGING_TENANT_ID || 'default' }}
          STAGING_PROMETHEUS_URL: ${{ secrets.STAGING_PROMETHEUS_URL || 'http://127.0.0.1:9090' }}
        run: |
          set -euo pipefail
          if [ -z "$STAGING_PUBLIC_BASE_URL" ] || [ -z "$STAGING_SMOKE_API_KEY" ]; then
            echo "Skipping staging smoke: STAGING_PUBLIC_BASE_URL or STAGING_SMOKE_API_KEY is not configured."
            exit 0
          fi
          if [[ "$STAGING_PUBLIC_BASE_URL" == *example.com* ]]; then
            echo "STAGING_PUBLIC_BASE_URL is still set to an example.com placeholder: ${STAGING_PUBLIC_BASE_URL}" >&2
            echo "For the local self-hosted staging runner, use a reachable URL such as http://127.0.0.1:8081." >&2
            exit 1
          fi
          if [[ "$STAGING_PROMETHEUS_URL" == *example.com* ]]; then
            echo "STAGING_PROMETHEUS_URL is still set to an example.com placeholder: ${STAGING_PROMETHEUS_URL}" >&2
            echo "Unset STAGING_PROMETHEUS_URL to skip observability checks, or set it to a reachable Prometheus URL." >&2
            exit 1
          fi
          args=(
            smoke
            --api-url "$STAGING_PUBLIC_BASE_URL"
            --api-key "$STAGING_SMOKE_API_KEY"
            --tenant-id "$STAGING_TENANT_ID"
            --artifact-dir "artifacts/staging/smoke/${SOURCE_SHA}"
          )
          if [ -n "$STAGING_PROMETHEUS_URL" ]; then
            args+=(--prometheus-url "$STAGING_PROMETHEUS_URL" --require-observability)
          fi
          python3 scripts/staging_operational_drill.py "${args[@]}"

      - name: Upload staging smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: staging-smoke-${{ env.SOURCE_SHA }}
          path: artifacts/staging/smoke/${{ env.SOURCE_SHA }}
          if-no-files-found: ignore

      - name: Upload staging observability artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: staging-observability-${{ env.SOURCE_SHA }}
          path: artifacts/staging/observability/${{ env.SOURCE_SHA }}
          if-no-files-found: ignore
