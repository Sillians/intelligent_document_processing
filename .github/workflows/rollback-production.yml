name: Rollback Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Previously known-good 40-character release SHA.
        required: true
        type: string
      reason:
        description: Reason for rollback.
        required: true
        type: string
      change_ticket:
        description: Optional incident or change ticket.
        required: false
        type: string

permissions:
  contents: read
  packages: read

concurrency:
  group: idp-production
  cancel-in-progress: false

jobs:
  rollback:
    name: Manually roll production back to a known-good image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.image_tag }}

      - name: Resolve rollback metadata
        env:
          PRODUCTION_APP_DIR: ${{ vars.PRODUCTION_APP_DIR || '/opt/idp' }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          ROLLBACK_REASON: ${{ inputs.reason }}
          CHANGE_TICKET: ${{ inputs.change_ticket }}
        run: |
          set -euo pipefail
          if ! [[ "$IMAGE_TAG" =~ ^[0-9a-f]{40}$ ]]; then
            echo "image_tag must be an immutable 40-character commit SHA" >&2
            exit 1
          fi
          if ! [[ "$PRODUCTION_APP_DIR" =~ ^/[A-Za-z0-9._/-]+$ ]] || [[ "$PRODUCTION_APP_DIR" == *".."* ]]; then
            echo "PRODUCTION_APP_DIR must be a safe absolute path." >&2
            exit 1
          fi
          image_namespace="ghcr.io/${GITHUB_REPOSITORY,,}"
          release_dir="${PRODUCTION_APP_DIR}/releases/${IMAGE_TAG}"
          evidence_dir="artifacts/production/rollback/${IMAGE_TAG}"
          mkdir -p "$evidence_dir"
          cat > "${evidence_dir}/rollback_request.json" <<JSON
          {
            "image_registry": "${image_namespace}",
            "image_tag": "${IMAGE_TAG}",
            "reason": "${ROLLBACK_REASON}",
            "change_ticket": "${CHANGE_TICKET}",
            "requested_by": "${GITHUB_ACTOR}",
            "workflow_run": "${GITHUB_RUN_ID}",
            "approved_environment": "production"
          }
          JSON
          {
            echo "IMAGE_NAMESPACE=${image_namespace}"
            echo "IMAGE_TAG=${IMAGE_TAG}"
            echo "PRODUCTION_APP_DIR=${PRODUCTION_APP_DIR}"
            echo "RELEASE_DIR=${release_dir}"
            echo "EVIDENCE_DIR=${evidence_dir}"
          } >> "$GITHUB_ENV"

      - name: Validate production secrets
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          PRODUCTION_SSH_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
          PRODUCTION_ENV_FILE: ${{ secrets.PRODUCTION_ENV_FILE }}
          PRODUCTION_PUBLIC_BASE_URL: ${{ secrets.PRODUCTION_PUBLIC_BASE_URL }}
          PRODUCTION_SMOKE_API_KEY: ${{ secrets.PRODUCTION_SMOKE_API_KEY }}
          PRODUCTION_PROMETHEUS_URL: ${{ secrets.PRODUCTION_PROMETHEUS_URL }}
          PRODUCTION_KNOWN_HOSTS: ${{ secrets.PRODUCTION_KNOWN_HOSTS }}
          PRODUCTION_TLS_CERT: ${{ secrets.PRODUCTION_TLS_CERT }}
          PRODUCTION_TLS_KEY: ${{ secrets.PRODUCTION_TLS_KEY }}
        run: |
          set -euo pipefail
          test -n "$PRODUCTION_HOST"
          test -n "$PRODUCTION_USER"
          test -n "$PRODUCTION_SSH_KEY"
          test -n "$PRODUCTION_ENV_FILE"
          test -n "$PRODUCTION_PUBLIC_BASE_URL"
          test -n "$PRODUCTION_SMOKE_API_KEY"
          test -n "$PRODUCTION_PROMETHEUS_URL"
          test -n "$PRODUCTION_KNOWN_HOSTS"
          test -n "$PRODUCTION_TLS_CERT"
          test -n "$PRODUCTION_TLS_KEY"
          [[ "$PRODUCTION_PUBLIC_BASE_URL" == https://* ]]
          if [ "$PRODUCTION_HOST" = "127.0.0.1" ] || [ "$PRODUCTION_HOST" = "localhost" ]; then
            echo "PRODUCTION_HOST must be dedicated infrastructure." >&2
            exit 1
          fi

      - name: Configure SSH
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_PORT: ${{ secrets.PRODUCTION_PORT || '22' }}
          PRODUCTION_SSH_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
          PRODUCTION_KNOWN_HOSTS: ${{ secrets.PRODUCTION_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$PRODUCTION_SSH_KEY" > ~/.ssh/id_production
          chmod 600 ~/.ssh/id_production
          test -n "$PRODUCTION_KNOWN_HOSTS"
          printf '%s\n' "$PRODUCTION_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Upload rollback bundle
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          PRODUCTION_PORT: ${{ secrets.PRODUCTION_PORT || '22' }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_production -p "$PRODUCTION_PORT" "${PRODUCTION_USER}@${PRODUCTION_HOST}" \
            "mkdir -p '${RELEASE_DIR}'"
          tar \
            --exclude='.git' \
            --exclude='.venv' \
            --exclude='artifacts' \
            --exclude='data' \
            --exclude='.env*' \
            --exclude='__pycache__' \
            -czf - . | ssh -i ~/.ssh/id_production -p "$PRODUCTION_PORT" "${PRODUCTION_USER}@${PRODUCTION_HOST}" \
            "tar -xzf - -C '${RELEASE_DIR}'"

      - name: Install production env file
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          PRODUCTION_PORT: ${{ secrets.PRODUCTION_PORT || '22' }}
          PRODUCTION_ENV_FILE: ${{ secrets.PRODUCTION_ENV_FILE }}
        run: |
          set -euo pipefail
          printf '%s\n' "$PRODUCTION_ENV_FILE" | ssh -i ~/.ssh/id_production -p "$PRODUCTION_PORT" "${PRODUCTION_USER}@${PRODUCTION_HOST}" \
            "cat > '${RELEASE_DIR}/.env.production.tmp' && chmod 600 '${RELEASE_DIR}/.env.production.tmp' && mv '${RELEASE_DIR}/.env.production.tmp' '${RELEASE_DIR}/.env.production'"

      - name: Install production TLS certificate
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          PRODUCTION_PORT: ${{ secrets.PRODUCTION_PORT || '22' }}
          PRODUCTION_TLS_CERT: ${{ secrets.PRODUCTION_TLS_CERT }}
          PRODUCTION_TLS_KEY: ${{ secrets.PRODUCTION_TLS_KEY }}
        run: |
          set -euo pipefail
          remote="${PRODUCTION_USER}@${PRODUCTION_HOST}"
          tls_dir="${RELEASE_DIR}/infra/traefik/tls"
          ssh -i ~/.ssh/id_production -p "$PRODUCTION_PORT" "${remote}" \
            "mkdir -p '${tls_dir}' && chmod 700 '${tls_dir}'"
          printf '%s\n' "$PRODUCTION_TLS_CERT" | ssh -i ~/.ssh/id_production -p "$PRODUCTION_PORT" "${remote}" \
            "umask 077; cat > '${tls_dir}/production.crt'"
          printf '%s\n' "$PRODUCTION_TLS_KEY" | ssh -i ~/.ssh/id_production -p "$PRODUCTION_PORT" "${remote}" \
            "umask 077; cat > '${tls_dir}/production.key'"

      - name: Roll back production services
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          PRODUCTION_PORT: ${{ secrets.PRODUCTION_PORT || '22' }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_production -p "$PRODUCTION_PORT" "${PRODUCTION_USER}@${PRODUCTION_HOST}" \
            "cd '${RELEASE_DIR}' && \
             echo '${GHCR_TOKEN}' | docker login ghcr.io -u '${GHCR_USERNAME}' --password-stdin && \
             export IDP_ENV_FILE=.env.production && \
             export IDP_IMAGE_REGISTRY='${IMAGE_NAMESPACE}' && \
             export IDP_IMAGE_TAG='${IMAGE_TAG}' && \
             python3 scripts/production_preflight.py --env-file .env.production --environment production && \
             bash scripts/deploy_release.sh && \
             ln -sfn '${RELEASE_DIR}' '${PRODUCTION_APP_DIR}/current'"

      - name: Run post-rollback production smoke
        env:
          PRODUCTION_PUBLIC_BASE_URL: ${{ secrets.PRODUCTION_PUBLIC_BASE_URL }}
          PRODUCTION_SMOKE_API_KEY: ${{ secrets.PRODUCTION_SMOKE_API_KEY }}
          PRODUCTION_TENANT_ID: ${{ vars.PRODUCTION_TENANT_ID || 'default' }}
          PRODUCTION_PROMETHEUS_URL: ${{ secrets.PRODUCTION_PROMETHEUS_URL }}
        run: |
          set -euo pipefail
          python3 scripts/staging_operational_drill.py smoke \
            --api-url "$PRODUCTION_PUBLIC_BASE_URL" \
            --api-key "$PRODUCTION_SMOKE_API_KEY" \
            --tenant-id "$PRODUCTION_TENANT_ID" \
            --prometheus-url "$PRODUCTION_PROMETHEUS_URL" \
            --require-observability \
            --artifact-dir "artifacts/production/rollback/${IMAGE_TAG}/smoke"

      - name: Upload production rollback artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-rollback-${{ env.IMAGE_TAG }}
          path: artifacts/production/rollback/${{ env.IMAGE_TAG }}
          if-no-files-found: ignore
