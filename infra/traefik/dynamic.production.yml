tls:
  certificates:
    - certFile: /etc/traefik/tls/production.crt
      keyFile: /etc/traefik/tls/production.key
  options:
    production:
      minVersion: VersionTLS12
      sniStrict: true

http:
  routers:
    idp-api-http:
      entryPoints:
        - web
      rule: "PathPrefix(`/`)"
      service: noop@internal
      middlewares:
        - idp-https-redirect

    idp-api-https:
      entryPoints:
        - websecure
      rule: "Path(`/`) || Path(`/health`) || (Method(`POST`) && Path(`/documents`)) || (Method(`GET`) && PathRegexp(`^/documents/[^/]+$`)) || (Method(`GET`) && PathRegexp(`^/documents/[^/]+/result$`))"
      service: idp-ingestion
      tls:
        options: production
      middlewares:
        - idp-security-headers
        - idp-rate-limit
        - idp-buffering

  services:
    idp-ingestion:
      loadBalancer:
        servers:
          - url: "http://ingestion-service:8000"

  middlewares:
    idp-https-redirect:
      redirectScheme:
        scheme: https
        permanent: true

    idp-buffering:
      buffering:
        maxRequestBodyBytes: 26214400

    idp-rate-limit:
      rateLimit:
        average: 60
        burst: 120
        period: 1m

    idp-security-headers:
      headers:
        contentTypeNosniff: true
        frameDeny: true
        referrerPolicy: no-referrer
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        customResponseHeaders:
          X-Permitted-Cross-Domain-Policies: none
