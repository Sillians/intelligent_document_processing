global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]
        labels:
          tier: observability

  - job_name: idp-api-services
    metrics_path: /metrics
    static_configs:
      - targets:
          - ingestion-service:8000
          - preprocess-worker:8010
          - ocr-service:8011
          - layout-service:8012
          - classifier-router-service:8013
          - extraction-service:8014
          - validation-service:8015
          - human-review-console:8016
          - delivery-service:8017
          - evaluation-service:8018
        labels:
          tier: idp-pipeline

  - job_name: idp-workflow-queue
    metrics_path: /metrics
    static_configs:
      - targets:
          - workflow-orchestrator:9091
        labels:
          tier: idp-control-plane

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100
        labels:
          tier: infrastructure
