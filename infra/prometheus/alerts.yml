groups:
  - name: idp-service-health
    rules:
      - alert: IDPServiceDown
        expr: up{tier="idp-pipeline"} == 0
        for: 2m
        labels:
          severity: critical
          category: availability
        annotations:
          summary: "IDP service {{ $labels.instance }} is down"
          description: "Prometheus has not been able to scrape {{ $labels.instance }} for at least 2 minutes. Check docker compose service health and application logs."

      - alert: IDPMetricsScrapeMissing
        expr: absent(up{tier="idp-pipeline"})
        for: 2m
        labels:
          severity: critical
          category: observability
        annotations:
          summary: "No IDP pipeline metrics are being scraped"
          description: "Prometheus has no active idp-pipeline scrape targets. Check prometheus.yml, Docker networking, and service availability."

  - name: idp-http-slos
    rules:
      - alert: IDPHigh5xxRate
        expr: sum by (service) (rate(http_requests_total{status=~"5.."}[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
          category: errors
        annotations:
          summary: "High 5xx rate on {{ $labels.service }}"
          description: "{{ $labels.service }} is returning more than 0.05 5xx responses/sec over 5 minutes. Inspect service logs and downstream dependencies."

      - alert: IDPAnyCritical5xxRate
        expr: sum by (service) (rate(http_requests_total{service=~"ingestion-service|validation-service|delivery-service",status=~"5.."}[5m])) > 0
        for: 3m
        labels:
          severity: critical
          category: errors
        annotations:
          summary: "Critical path service {{ $labels.service }} is returning 5xx responses"
          description: "A critical path service has sustained 5xx responses for 3 minutes. This may block document intake, validation, or delivery."

      - alert: IDPHighClientErrorRate
        expr: sum by (service) (rate(http_requests_total{status=~"4.."}[5m])) > 0.2
        for: 10m
        labels:
          severity: warning
          category: client-errors
        annotations:
          summary: "High 4xx rate on {{ $labels.service }}"
          description: "{{ $labels.service }} is receiving a high rate of invalid or unauthorized requests. Check callers, auth, payload validation, and API clients."

      - alert: IDPHighP95Latency
        expr: histogram_quantile(0.95, sum by (service, le) (rate(http_request_duration_seconds_bucket[5m]))) > 5
        for: 10m
        labels:
          severity: warning
          category: latency
        annotations:
          summary: "High p95 latency on {{ $labels.service }}"
          description: "{{ $labels.service }} p95 latency is above 5 seconds for 10 minutes. Check CPU-bound processing, downstream calls, storage latency, and worker saturation."

      - alert: IDPNoRecentTraffic
        expr: sum by (service) (rate(http_requests_total{path!="/health",path!="/metrics"}[30m])) == 0
        for: 30m
        labels:
          severity: info
          category: traffic
        annotations:
          summary: "No recent non-health traffic for {{ $labels.service }}"
          description: "{{ $labels.service }} has only health/metrics traffic for 30 minutes. This can be normal in development, but may indicate an idle or broken pipeline in production."

  - name: idp-queue-health
    rules:
      - alert: IDPTemporalQueueBacklogHigh
        expr: sum by (namespace, task_queue) (idp_temporal_task_queue_backlog) > 10
        for: 5m
        labels:
          severity: warning
          category: queue-depth
        annotations:
          summary: "Temporal task queue {{ $labels.task_queue }} has a sustained backlog"
          description: "The combined workflow and activity backlog has exceeded 10 tasks for 5 minutes. Check worker health, activity latency, and downstream service capacity."

      - alert: IDPTemporalQueueMetricsStale
        expr: time() - idp_temporal_task_queue_metrics_last_success_timestamp_seconds > 120
        for: 2m
        labels:
          severity: critical
          category: queue-depth
        annotations:
          summary: "Temporal task queue metrics are stale"
          description: "The workflow orchestrator has not collected queue metrics for more than two minutes. Check Temporal connectivity and the worker metrics endpoint."

      - alert: IDPTemporalQueueMetricsMissing
        expr: absent(idp_temporal_task_queue_backlog)
        for: 2m
        labels:
          severity: critical
          category: queue-depth
        annotations:
          summary: "Temporal task queue metrics are missing"
          description: "Prometheus has no Temporal backlog series. Check the workflow orchestrator metrics server and Prometheus target."

  - name: idp-infrastructure
    rules:
      - alert: IDPNodeExporterDown
        expr: up{job="node-exporter"} == 0
        for: 2m
        labels:
          severity: critical
          category: disk-space
        annotations:
          summary: "Node Exporter is unavailable"
          description: "Prometheus cannot scrape filesystem capacity metrics, so disk-space alerting is unavailable."

      - alert: IDPDiskSpaceLow
        expr: |
          (
            node_filesystem_avail_bytes{fstype!~"tmpfs|ramfs|squashfs"}
            /
            node_filesystem_size_bytes{fstype!~"tmpfs|ramfs|squashfs"}
          ) < 0.15
        for: 10m
        labels:
          severity: warning
          category: disk-space
        annotations:
          summary: "Staging disk free space is below 15%"
          description: "A monitored filesystem has less than 15% free space for 10 minutes. Prune unused images and artifacts or expand storage before the next deployment."

      - alert: IDPDiskSpaceCritical
        expr: |
          (
            node_filesystem_avail_bytes{fstype!~"tmpfs|ramfs|squashfs"}
            /
            node_filesystem_size_bytes{fstype!~"tmpfs|ramfs|squashfs"}
          ) < 0.05
        for: 5m
        labels:
          severity: critical
          category: disk-space
        annotations:
          summary: "Staging disk free space is below 5%"
          description: "The root filesystem is critically low on free space. Stop large image pulls and reclaim storage immediately."
