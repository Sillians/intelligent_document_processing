name: idp-staging-stack

services:
  gateway:
    volumes: !override
      - ./infra/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./infra/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro

  postgres:
    ports: !reset []

  redis:
    ports: !reset []

  seaweedfs:
    ports: !reset []

  temporal:
    ports: !reset []

  temporal-ui:
    ports: !reset []

  label-studio:
    ports: !reset []

  mlflow:
    image: ${IDP_IMAGE_REGISTRY:?set IDP_IMAGE_REGISTRY}/mlflow:${IDP_IMAGE_TAG:?set IDP_IMAGE_TAG}
    platform: linux/amd64
    ports: !reset []

  ingestion-service:
    image: ${IDP_IMAGE_REGISTRY:?set IDP_IMAGE_REGISTRY}/ingestion-service:${IDP_IMAGE_TAG:?set IDP_IMAGE_TAG}
    platform: linux/amd64
    ports: !reset []

  workflow-orchestrator:
    image: ${IDP_IMAGE_REGISTRY:?set IDP_IMAGE_REGISTRY}/workflow-orchestrator:${IDP_IMAGE_TAG:?set IDP_IMAGE_TAG}
    platform: linux/amd64

  preprocess-worker:
    image: ${IDP_IMAGE_REGISTRY:?set IDP_IMAGE_REGISTRY}/preprocess-worker:${IDP_IMAGE_TAG:?set IDP_IMAGE_TAG}
    platform: linux/amd64

  ocr-service:
    image: ${IDP_IMAGE_REGISTRY:?set IDP_IMAGE_REGISTRY}/ocr-service:${IDP_IMAGE_TAG:?set IDP_IMAGE_TAG}
    platform: !reset null
    environment:
      OCR_BACKEND: ${OCR_BACKEND:-tesseract}
      OCR_FORCE_FALLBACK: ${OCR_FORCE_FALLBACK:-false}

  layout-service:
    image: ${IDP_IMAGE_REGISTRY:?set IDP_IMAGE_REGISTRY}/layout-service:${IDP_IMAGE_TAG:?set IDP_IMAGE_TAG}
    platform: linux/amd64

  classifier-router-service:
    image: ${IDP_IMAGE_REGISTRY:?set IDP_IMAGE_REGISTRY}/classifier-router-service:${IDP_IMAGE_TAG:?set IDP_IMAGE_TAG}
    platform: linux/amd64

  extraction-service:
    image: ${IDP_IMAGE_REGISTRY:?set IDP_IMAGE_REGISTRY}/extraction-service:${IDP_IMAGE_TAG:?set IDP_IMAGE_TAG}
    platform: linux/amd64

  validation-service:
    image: ${IDP_IMAGE_REGISTRY:?set IDP_IMAGE_REGISTRY}/validation-service:${IDP_IMAGE_TAG:?set IDP_IMAGE_TAG}
    platform: linux/amd64

  human-review-console:
    image: ${IDP_IMAGE_REGISTRY:?set IDP_IMAGE_REGISTRY}/human-review-console:${IDP_IMAGE_TAG:?set IDP_IMAGE_TAG}
    platform: linux/amd64
    ports: !reset []
    environment:
      REVIEW_PROVIDER: ${STAGING_REVIEW_PROVIDER:-label_studio}

  delivery-service:
    image: ${IDP_IMAGE_REGISTRY:?set IDP_IMAGE_REGISTRY}/delivery-service:${IDP_IMAGE_TAG:?set IDP_IMAGE_TAG}
    platform: linux/amd64

  evaluation-service:
    image: ${IDP_IMAGE_REGISTRY:?set IDP_IMAGE_REGISTRY}/evaluation-service:${IDP_IMAGE_TAG:?set IDP_IMAGE_TAG}
    platform: linux/amd64
    ports: !reset []

  prometheus:
    ports:
      - "127.0.0.1:${PROMETHEUS_HOST_PORT:-9090}:9090"

  alertmanager:
    ports:
      - "127.0.0.1:${ALERTMANAGER_HOST_PORT:-9093}:9093"

  grafana:
    ports:
      - "127.0.0.1:${GRAFANA_HOST_PORT:-3000}:3000"
